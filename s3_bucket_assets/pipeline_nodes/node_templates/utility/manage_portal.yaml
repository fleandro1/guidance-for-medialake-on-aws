spec: v1.0.0
node:
  id: manage_portal
  title: Manage Portal
  description: Create or update an upload portal and generate a shareable link
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/ManagePortalLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              resources:
                - ${SYSTEM_SETTINGS_TABLE_ARN}
            - effect: Allow
              actions:
                - secretsmanager:CreateSecret
                - secretsmanager:DeleteSecret
              resources:
                - arn:aws:secretsmanager:${AWS_REGION}:${ACCOUNT_ID}:secret:${RESOURCE_PREFIX}/portals/*
actions:
  generate:
    summary: Manage portal
    description: Create or update an upload portal and generate a shareable link
    operationId: managePortal
    parameters:
      - in: body
        name: Template ID
        label: Template
        description: >-
          Optional. Select a saved portal Template to seed the portal's
          structure (pages, fields, destinations), appearance and limits — so
          you don't have to hand-write a Default Portal Config. Values in
          Default Portal Config and runtime Field Mapping still override the
          template. Manage templates under Settings > Upload Portals > Templates.
        required: false
        schema:
          type: select
      - in: body
        name: Theme ID
        label: Theme
        description: >-
          Optional. Select a saved appearance Theme to apply the portal's look
          (colors, typography, layout). A Theme overrides the template's
          appearance; Default Portal Config still wins over both. Manage themes
          under Settings > Upload Portals > Themes.
        required: false
        schema:
          type: select
      - in: body
        name: Field Mapping
        required: false
        default: {}
        schema:
          type: object
      - in: body
        name: Default Portal Config
        required: false
        default: {}
        schema:
          type: object
      - in: body
        name: Token Expiry Days
        required: false
        default: 7
        schema:
          type: number
      - in: body
        name: Email Field
        required: false
        schema:
          type: string
    x-requestMapping: utility/manage_portal/generate/
    x-responseMapping: utility/manage_portal/generate/
    connections:
      incoming:
        type: [any]
      outgoing:
        type: [portal_link]
